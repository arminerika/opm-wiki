<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <title>OPM Wiki</title>
    <link rel="stylesheet" href="/style.css" />
    <script defer src="/scripts/header.js"></script>
    <script defer src="/scripts/artist.js"></script>
  </head>
  <body>
    <header></header>
    <main id="artist-content" class="artist-info">
      <div class="image-container">
        <img id="image" src="" alt="artist image" />
      </div>
      <div class="artist-details">
        <h2 id="name"></h2>
        <p id="genre"></p>
        <p id="origin"></p>
        <p id="formed"></p>
        <p id="label"></p>
        <p id="description"></p>
        <p id="submittedBy"></p>
        <p id="submittedOn"></p>
        <div id="links"></div>
      </div>
    </main>
  </body>
</html>
